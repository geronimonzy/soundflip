# Sample config format only.
# The live config is stored per-user at %LocalAppData%\audsw\audsw.cfg.
# Names are matched case-insensitively as a substring, so a short
# unique fragment is enough. Run `audsw list` to see exact names.

device1 = Speakers
device2 = Headphones

# Hotkey used by the tray app. Modifiers: ctrl, alt, shift, win.
# Key can be a letter, a digit, or f1..f12.
hotkey  = ctrl+alt+o
