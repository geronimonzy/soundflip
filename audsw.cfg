# LEGACY sample config (flat format). Current builds store settings as JSON at
# %LocalAppData%\audsw\audsw.json; an existing audsw.cfg like this one is imported
# automatically on first launch (device1/device2 -> output ring, hotkey ->
# cycle-output hotkey) and rewritten as JSON. Kept here as a migration reference.
# Names are matched case-insensitively as a substring, so a short
# unique fragment is enough. Run `audsw list` to see exact names.

device1 = Speakers
device2 = Headphones

# Hotkey used by the tray app. Modifiers: ctrl, alt, shift, win.
# Key can be a letter, a digit, or f1..f12.
hotkey  = ctrl+alt+o
