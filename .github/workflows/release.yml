name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Guards against a tag pushed without bumping <Version> in soundflip.csproj
      # (or vice versa) — the zip/release name comes from the tag while the
      # exe/MSIX version comes from the csproj, so they must agree.
      - name: Verify tag matches csproj version
        shell: pwsh
        run: |
          [xml]$proj = Get-Content .\soundflip.csproj
          $versions = @($proj.Project.PropertyGroup.Version | Where-Object { $_ })
          if ($versions.Count -eq 0) { throw "Could not read <Version> from soundflip.csproj" }
          if ($versions.Count -gt 1) { throw "Found multiple <Version> elements in soundflip.csproj — expected exactly one" }
          $csprojVersion = $versions[0]

          $tag = '${{ github.ref_name }}'
          $tagVersion = $tag -replace '^v', ''

          if ($tagVersion -ne $csprojVersion) {
            Write-Error "Tag '$tag' (version $tagVersion) does not match soundflip.csproj <Version>$csprojVersion</Version>"
            exit 1
          }

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore .\soundflip.Tests\soundflip.Tests.csproj

      - name: Build tests and app
        run: dotnet build .\soundflip.Tests\soundflip.Tests.csproj -c Release --no-restore

      - name: Run unit tests
        run: dotnet test .\soundflip.Tests\soundflip.Tests.csproj -c Release --no-build --verbosity normal

      - name: Publish app
        shell: pwsh
        run: .\build.ps1

      # soundflip is a WinExe, so PowerShell does not wait for it or surface its exit
      # code on a bare invocation; Start-Process -Wait with redirected output does.
      - name: Smoke check published app
        shell: pwsh
        run: |
          $helpLog = Join-Path $env:RUNNER_TEMP 'soundflip-help.txt'
          $p = Start-Process -FilePath .\dist\soundflip.exe -ArgumentList 'help' `
            -NoNewWindow -Wait -PassThru -RedirectStandardOutput $helpLog
          Get-Content $helpLog
          if ($p.ExitCode -ne 0) { throw "soundflip help exited with code $($p.ExitCode)" }

          $outDir = Join-Path $env:RUNNER_TEMP 'soundflip-release-assets'
          if (Test-Path $outDir) { Remove-Item $outDir -Recurse -Force }
          $p = Start-Process -FilePath .\dist\soundflip.exe -ArgumentList "export-assets `"$outDir`"" `
            -NoNewWindow -Wait -PassThru
          if ($p.ExitCode -ne 0) { throw "soundflip export-assets exited with code $($p.ExitCode)" }

      - name: Package release bundle
        id: package
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          $zipName = "soundflip-$tag-win-x64.zip"
          if (Test-Path $zipName) { Remove-Item $zipName -Force }

          Compress-Archive -Path .\dist\* -DestinationPath $zipName -Force

          $zipPath = (Resolve-Path $zipName).Path
          "asset_name=$zipName" >> $env:GITHUB_OUTPUT
          "asset_path=$zipPath" >> $env:GITHUB_OUTPUT

          # Publish a SHA-256 alongside the zip so users can verify what they
          # downloaded (the exe is unsigned, so this is the integrity story).
          $hash = (Get-FileHash $zipPath -Algorithm SHA256).Hash.ToLowerInvariant()
          $shaName = "$zipName.sha256"
          "$hash *$zipName" | Set-Content $shaName -Encoding ascii
          "checksum_path=$((Resolve-Path $shaName).Path)" >> $env:GITHUB_OUTPUT

      # Unsigned MSIX for Microsoft Store submission (the Store signs uploads
      # itself). Uploaded as a run artifact, NOT a release asset: end users
      # cannot install an unsigned MSIX, so putting it on the release page
      # would only confuse them. Real identity values come from repo variables
      # once Partner Center is set up; until then dev placeholders are used.
      - name: Build MSIX package (unsigned, for Store submission)
        shell: pwsh
        run: |
          .\package-msix.ps1 `
            -PackageName '${{ vars.MSIX_PACKAGE_NAME || 'KirillFedorov.SoundFlip' }}' `
            -Publisher '${{ vars.MSIX_PUBLISHER || 'CN=00000000-0000-0000-0000-000000000000' }}' `
            -PublisherDisplayName '${{ vars.MSIX_PUBLISHER_DISPLAY_NAME || 'Kirill Fedorov' }}'

      - name: Upload MSIX package
        uses: actions/upload-artifact@v4
        with:
          name: soundflip-${{ github.ref_name }}-msix-unsigned
          path: dist-msix/*.msix
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: SoundFlip ${{ github.ref_name }}
          files: |
            ${{ steps.package.outputs.asset_path }}
            ${{ steps.package.outputs.checksum_path }}
          generate_release_notes: true

      # Submit the unsigned MSIX to the Microsoft Store (product 9NZ9F23HXFSB).
      # Runs after the GitHub release so a Store API failure never blocks the
      # zip release; certification takes hours-to-days before the update is
      # live. Requires the four Partner Center secrets; free apps only.
      - name: Install Microsoft Store CLI
        uses: microsoft/microsoft-store-apppublisher@v1.1

      - name: Configure Store credentials
        shell: pwsh
        run: |
          msstore reconfigure `
            --tenantId ${{ secrets.AZURE_AD_TENANT_ID }} `
            --sellerId ${{ secrets.SELLER_ID }} `
            --clientId ${{ secrets.AZURE_AD_APPLICATION_CLIENT_ID }} `
            --clientSecret ${{ secrets.AZURE_AD_APPLICATION_SECRET }}

      - name: Publish to Microsoft Store
        shell: pwsh
        run: |
          $msix = @(Get-ChildItem dist-msix\*.msix)
          if ($msix.Count -ne 1) { throw "Expected exactly one MSIX in dist-msix, found $($msix.Count)" }
          msstore publish $msix[0].FullName -id 9NZ9F23HXFSB
          if ($LASTEXITCODE -ne 0) { Write-Error "msstore publish failed"; exit 1 }
