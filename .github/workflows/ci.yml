name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: |
          dotnet restore .\core\audsw.Core.csproj
          dotnet restore .\audsw.Tests\audsw.Tests.csproj
          dotnet restore .\app\audsw.App.csproj

      - name: Build core + tests
        run: dotnet build .\audsw.Tests\audsw.Tests.csproj -c Release --no-restore

      - name: Run unit tests
        run: dotnet test .\audsw.Tests\audsw.Tests.csproj -c Release --no-build --verbosity normal

      - name: Build app
        run: dotnet build .\app\audsw.App.csproj -c Release -p:Platform=x64 --no-restore

      - name: Publish app
        shell: pwsh
        run: .\build.ps1

      - name: Smoke check help output
        shell: pwsh
        run: |
          & .\dist\audsw.exe help

      - name: Upload published bundle
        uses: actions/upload-artifact@v4
        with:
          name: audsw-dist-${{ github.sha }}
          path: dist
          if-no-files-found: error
